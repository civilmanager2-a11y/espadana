<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پوستر فروش ویژه | اسپادانا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #03060e;
    font-family: 'Vazirmatn', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer centering shell */
  .poster-shell {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Fixed 1024×1820 canvas — scaled to fit viewport via JS */
  .poster-canvas {
    width: 1024px;
    height: 1820px;
    position: relative;
    overflow: hidden;
    direction: rtl;
    font-family: 'Vazirmatn', sans-serif;
    color: #fff;
    background: linear-gradient(162deg, #0d1937 0%, #0a1228 52%, #070c1c 100%);
    transform-origin: center center;
    animation: spadanaPosterSway 5.4s ease-in-out infinite;
    will-change: transform;
  }
  /* scale is applied inline by JS — animation needs to compose */
  /* We use a wrapper to separate scale from sway */
  .poster-sway-wrap {
    transform-origin: top center;
    animation: spadanaSway 5.4s ease-in-out infinite;
  }

  @keyframes spadanaSway {
    0%   { transform: rotate(-1.25deg); }
    50%  { transform: rotate(1.35deg); }
    100% { transform: rotate(-1.25deg); }
  }
  @keyframes spadanaPinSway {
    0%   { transform: translateX(-50%) rotate(1.25deg); }
    50%  { transform: translateX(-50%) rotate(-1.35deg); }
    100% { transform: translateX(-50%) rotate(1.25deg); }
  }
  @keyframes spadanaGlow {
    0%, 100% { opacity: .55; }
    50%       { opacity: .9; }
  }

  .close-btn {
    position: fixed;
    top: 14px; left: 14px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.22);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background .2s;
    text-decoration: none;
    z-index: 9999;
  }
  .close-btn:hover { background: rgba(255,255,255,.24); }
</style>
</head>
<body>
<a class="close-btn" href="javascript:window.close()" title="بستن">✕</a>

<div class="poster-shell">
<!-- Scale wrapper set by JS -->
<div id="posterScale" style="transform-origin:center center;">
<div class="poster-sway-wrap">
<div class="poster-canvas" id="posterCanvas"></div><!-- content injected at runtime from poster-content.html — edit that single file to update prices/offers in both this fullscreen page and the homepage hero banner -->
</div><!-- /poster-sway-wrap -->
</div><!-- /posterScale -->
</div><!-- /poster-shell -->

<script>
/* ═══════════════════════════════════════════════════════════
   poster.html  — runtime init
   Content is loaded from poster-content.html (single source
   of truth for all product names, prices, fonts & colours).
   To update offers: edit poster-content.html only.
   ═══════════════════════════════════════════════════════════ */
(function () {
  var DEADLINE_KEY = 'spadana_sale_deadline';
  var deadline;
  try { deadline = parseInt(localStorage.getItem(DEADLINE_KEY) || '', 10); } catch(e) {}
  if (!deadline || isNaN(deadline)) {
    deadline = new Date('2026-07-30T23:59:59').getTime();
    try { localStorage.setItem(DEADLINE_KEY, String(deadline)); } catch(e) {}
  }

  var audioCtx = null, soundEnabled = false, lastSec = -1;

  function toFa(n) {
    return String(n).padStart(2,'0').replace(/[0-9]/g, function(d){ return '۰۱۲۳۴۵۶۷۸۹'[d]; });
  }
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTick(urgent) {
    try {
      var ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = urgent ? 1200 : 880; o.type = 'sine';
      var dur = urgent ? 0.18 : 0.12;
      g.gain.setValueAtTime(urgent ? 0.28 : 0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function tick() {
    var diff = deadline - Date.now();
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(function(id){
        var el = document.getElementById(id); if(el) el.textContent = '۰۰';
      });
      return;
    }
    var d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    var el;
    if((el=document.getElementById('cd-d'))) el.textContent=toFa(d);
    if((el=document.getElementById('cd-h'))) el.textContent=toFa(h);
    if((el=document.getElementById('cd-m'))) el.textContent=toFa(m);
    if((el=document.getElementById('cd-s'))) el.textContent=toFa(s);
    if (soundEnabled && s !== lastSec) { lastSec=s; playTick(Math.floor(diff/1000)<=10); }
    setTimeout(tick, 500);
  }
  function enableSound() {
    if (soundEnabled) return; soundEnabled=true;
    try { getCtx().resume(); } catch(e) {}
    document.removeEventListener('click', enableSound);
    document.removeEventListener('keydown', enableSound);
  }
  function applyScale() {
    var vw=document.documentElement.clientWidth||window.innerWidth||0;
    var vh=document.documentElement.clientHeight||window.innerHeight||0;
    if (vw<100||vh<100) return;
    var scale=Math.min(vw/1024, vh/1820);
    var el=document.getElementById('posterScale');
    el.style.transformOrigin='top center';
    el.style.transform='scale('+scale+')';
    var scaledH=1820*scale, offsetY=(vh-scaledH)/2;
    el.style.marginTop=Math.max(0,offsetY)+'px';
  }

  /* Load shared content then start everything */
  fetch('poster-content.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('posterCanvas').innerHTML = html;
      applyScale();
      window.addEventListener('resize', applyScale);
      document.addEventListener('click', enableSound);
      document.addEventListener('keydown', enableSound);
      tick();
    })
    .catch(function(){ /* server not running — content already missing, nothing to do */ });
})();
</script>
</body>
</html>
