<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پوستر فروش ویژه | اسپادانا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05080f;
    font-family: 'Vazirmatn', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: auto;
    gap: 0;
  }
  .poster-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 0;
    max-width: 100vw;
  }
  .poster-img {
    max-width: 100%;
    max-height: calc(100vh - 140px);
    object-fit: contain;
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.85), 0 0 0 2px rgba(255,184,0,0.35);
    display: block;
  }
  /* Countdown bar below poster */
  .cd-bar {
    width: 100%;
    max-width: 640px;
    background: linear-gradient(135deg, rgba(15,30,60,0.95), rgba(8,16,36,0.98));
    border: 1.5px solid rgba(255,184,0,0.4);
    border-top: none;
    border-radius: 0 0 20px 20px;
    padding: 14px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .cd-label {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,200,80,0.85);
    white-space: nowrap;
  }
  .cd-units {
    display: flex;
    gap: 8px;
    align-items: center;
    direction: ltr;
  }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .cd-digit {
    font-size: 32px;
    font-weight: 900;
    color: #FFB800;
    background: rgba(255,184,0,0.1);
    border: 1.5px solid rgba(255,184,0,0.3);
    border-radius: 10px;
    width: 60px;
    text-align: center;
    line-height: 1.25;
    padding: 4px 0;
    transition: color 0.08s;
  }
  .cd-digit.tick { color: #fff; }
  .cd-lbl { font-size: 10px; color: rgba(255,200,80,0.6); font-weight: 600; }
  .cd-sep {
    font-size: 28px;
    font-weight: 900;
    color: rgba(255,184,0,0.45);
    line-height: 1;
    margin-bottom: 14px;
  }
  .close-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
    text-decoration: none;
    z-index: 100;
  }
  .close-btn:hover { background: rgba(255,255,255,0.2); }
  @media (max-width: 500px) {
    .cd-digit { font-size: 22px; width: 44px; }
    .cd-sep { font-size: 20px; }
  }
</style>
</head>
<body>
<a class="close-btn" href="javascript:window.close()" title="بستن">✕</a>
<div class="poster-wrap">
  <img class="poster-img" src="assets/spadana-poster.jpg" alt="پوستر فروش ویژه سازه‌های پشت‌بام اسپادانا">
  <div class="cd-bar">
    <div class="cd-label">⏳ پایان قیمت ویژه تا:</div>
    <div class="cd-units">
      <div class="cd-unit">
        <div class="cd-digit" id="cd-d">۳۰</div>
        <div class="cd-lbl">روز</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-digit" id="cd-h">۰۰</div>
        <div class="cd-lbl">ساعت</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-digit" id="cd-m">۰۰</div>
        <div class="cd-lbl">دقیقه</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-digit" id="cd-s">۰۰</div>
        <div class="cd-lbl">ثانیه</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var DEADLINE = new Date('2026-07-30T23:59:59').getTime();
  var audioCtx = null;
  var soundEnabled = false;
  var lastSec = -1;

  function toFa(n, pad) {
    return String(n).padStart(pad || 2, '0').replace(/[0-9]/g, function(d){ return '۰۱۲۳۴۵۶۷۸۹'[d]; });
  }

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playTick(urgent) {
    try {
      var ctx = getCtx();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = urgent ? 1200 : 880;
      osc.type = 'sine';
      var dur = urgent ? 0.18 : 0.12;
      gain.gain.setValueAtTime(urgent ? 0.28 : 0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function playDing() {
    try {
      var ctx = getCtx();
      [523, 659, 784].forEach(function(f, i) {
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f; o.type = 'sine';
        var t = ctx.currentTime + i * 0.18;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        o.start(t); o.stop(t + 0.6);
      });
    } catch(e) {}
  }

  function tick() {
    var diff = DEADLINE - Date.now();
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(function(id){ document.getElementById(id).textContent = '۰۰'; });
      if (soundEnabled) playDing();
      return;
    }
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);

    document.getElementById('cd-d').textContent = toFa(d);
    document.getElementById('cd-h').textContent = toFa(h);
    document.getElementById('cd-m').textContent = toFa(m);
    document.getElementById('cd-s').textContent = toFa(s);

    if (soundEnabled && s !== lastSec) {
      lastSec = s;
      var el = document.getElementById('cd-s');
      el.classList.add('tick');
      setTimeout(function(){ el.classList.remove('tick'); }, 80);
      playTick(Math.floor(diff / 1000) <= 10);
    }
    setTimeout(tick, 500);
  }

  function enableSound() {
    if (soundEnabled) return;
    soundEnabled = true;
    try { getCtx().resume(); } catch(e) {}
    document.removeEventListener('click', enableSound);
    document.removeEventListener('keydown', enableSound);
  }
  document.addEventListener('click', enableSound);
  document.addEventListener('keydown', enableSound);

  tick();
})();
</script>
</body>
</html>
