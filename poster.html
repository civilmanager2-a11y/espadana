<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پوستر فروش ویژه | اسپادانا</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #05080f;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
  }
  .poster-container {
    position: relative;
    max-width: 100vw;
    max-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .poster-img {
    max-width: 100%;
    max-height: calc(100vh - 48px);
    object-fit: contain;
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.85), 0 0 0 2px rgba(255,184,0,0.35);
    display: block;
  }
  .close-btn {
    position: fixed;
    top: 18px;
    left: 18px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
    text-decoration: none;
  }
  .close-btn:hover { background: rgba(255,255,255,0.22); }
</style>
</head>
<body>
<a class="close-btn" href="javascript:window.close()" title="بستن">✕</a>
<div class="poster-container">
  <img class="poster-img" src="assets/spadana-poster.jpg" alt="پوستر فروش ویژه سازه‌های پشت‌بام اسپادانا">
</div>
</body>
</html>
